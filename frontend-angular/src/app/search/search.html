<section class="search">

  <h1 class="search-titulo">Encontre aqui seu próximo veículo!</h1>

  <div class="search-container">
    <input
      class="search-input"
      type="text"
      placeholder="🔍  Buscar veículo..."
      [(ngModel)]="termoBusca"
    />

    <div class="search-filtros">

      <!-- Marca -->
      <div class="dropdown">
        <button class="dropdown__btn" (click)="toggleDropdown('marca')">
          {{ marcaSelecionada || 'Marca' }}
          <span class="dropdown__seta">▾</span>
        </button>
        @if (dropdownAberto === 'marca') {
          <div class="dropdown__menu">
            @for (marca of marcas; track marca) {
              <div class="dropdown__item" (click)="selecionar('marca', marca)">
                {{ marca }}
              </div>
            }
          </div>
        }
      </div>

      <!-- Ano -->
      <div class="dropdown">
        <button class="dropdown__btn" (click)="toggleDropdown('ano')">
          {{ anoSelecionado || 'Ano' }}
          <span class="dropdown__seta">▾</span>
        </button>
        @if (dropdownAberto === 'ano') {
          <div class="dropdown__menu">
            @for (ano of anos; track ano) {
              <div class="dropdown__item" (click)="selecionar('ano', ano)">
                {{ ano }}
              </div>
            }
          </div>
        }
      </div>

      <!-- Preço -->
      <div class="dropdown">
        <button class="dropdown__btn" (click)="toggleDropdown('preco')">
          {{ precoSelecionado || 'Preço' }}
          <span class="dropdown__seta">▾</span>
        </button>
        @if (dropdownAberto === 'preco') {
          <div class="dropdown__menu">
            @for (preco of precos; track preco) {
              <div class="dropdown__item" (click)="selecionar('preco', preco)">
                {{ preco }}
              </div>
            }
          </div>
        }
      </div>

      <button class="search__btn">Buscar</button>

    </div>
  </div>

</section>
